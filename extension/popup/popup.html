<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>ClaudeTOC</title>
  </head>
  <body>
    <div class="ctv-popup">
      <h1 class="ctv-popup-title">ClaudeTOC</h1>
      <p class="ctv-popup-version">v0.1.0 · Build a table of contents of your Claude chats</p>
      <p class="ctv-popup-note">
        Type <code>/node Topic &gt; Subtopic</code> in a
        message to initialise a section.
      </p>
      <p class="ctv-popup-note ctv-popup-muted">
        For more, see:
        <a
          href="https://github.com/sfmig/claude-conversation-tree#how-to-create-a-toc"
          target="_blank"
          rel="noopener"
          title="https://github.com/sfmig/claude-conversation-tree#how-to-create-a-toc"
          >how to create a Claude TOC</a
        >
      </p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
